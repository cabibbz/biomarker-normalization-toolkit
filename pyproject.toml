[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "biomarker-normalization-toolkit"
version = "0.1.0"
description = "Customer-run toolkit for biomarker normalization and canonical output."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
bnt = "biomarker_normalization_toolkit.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
biomarker_normalization_toolkit = ["data/*.csv"]
