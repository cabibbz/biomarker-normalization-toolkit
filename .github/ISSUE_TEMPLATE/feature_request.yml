name: Feature request
description: Suggest a new biomarker mapping, parser improvement, or developer feature.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What change would help?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add sample source names, units, files, or standards references if relevant.
