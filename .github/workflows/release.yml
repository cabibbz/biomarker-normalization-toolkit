name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

  contract:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --no-cache-dir -e ".[rest]"

      - name: Verify checked-in OpenAPI spec
        run: |
          python scripts/export_openapi.py
          git diff --exit-code docs/openapi.json

      - name: Run public fixture sanity check
        run: |
          python scripts/scrutinize.py

  test:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --no-cache-dir -e ".[all]"
          python -m pip install pytest httpx python-multipart hypothesis

      - name: Run normalization tests
        run: pytest tests/test_normalization.py -v

      - name: Run property-based tests
        run: pytest tests/test_properties.py -v

      - name: Run API tests
        run: pytest tests/test_api.py -v

      - name: Verify CLI
        run: |
          bnt --version
          bnt status
          bnt demo --output-dir demo_out
          bnt analyze --input src/biomarker_normalization_toolkit/data/v0_sample.csv

  publish:
    needs: [test, contract]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
          python scripts/check_distribution_contents.py

      - name: Smoke-test built wheel
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          pip install dist/*.whl
          bnt status
          python scripts/smoke_installed_package.py

      - name: Smoke-test source distribution
        run: |
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          pip install dist/*.tar.gz
          bnt status
          python scripts/smoke_installed_package.py

      - name: Smoke-test packaged REST server
        run: |
          python -m venv .venv-rest
          . .venv-rest/bin/activate
          pip install dist/*.whl fastapi uvicorn[standard] pydantic python-multipart
          python scripts/smoke_installed_package.py --serve --port 8010

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
