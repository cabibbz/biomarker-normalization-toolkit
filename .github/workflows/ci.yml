name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --no-cache-dir -e ".[all]"
          python -m pip install pytest httpx python-multipart hypothesis

      - name: Run normalization tests
        run: pytest tests/test_normalization.py -v

      - name: Run property-based tests
        run: pytest tests/test_properties.py -v

      - name: Run API tests
        run: pytest tests/test_api.py -v

      - name: Verify CLI
        run: |
          bnt --version
          bnt status
          bnt demo --output-dir demo_out

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/*
