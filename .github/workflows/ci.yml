name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          pip install --no-cache-dir -e ".[all]"
          pip install pytest httpx python-multipart hypothesis

      - name: Run normalization tests
        run: pytest tests/test_normalization.py -v

      - name: Run property-based tests
        run: pytest tests/test_properties.py -v

      - name: Run API tests
        run: pytest tests/test_api.py -v

      - name: Verify CLI
        run: |
          bnt --version
          bnt status
          bnt demo --output-dir demo_out

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
