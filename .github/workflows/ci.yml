name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --no-cache-dir -e ".[all]"
          python -m pip install pytest httpx python-multipart hypothesis

      - name: Run full test suite
        run: pytest -q

      - name: Verify CLI
        run: |
          bnt --version
          bnt status
          bnt demo --output-dir demo_out
          bnt analyze --input src/biomarker_normalization_toolkit/data/v0_sample.csv

  contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --no-cache-dir -e ".[rest]"

      - name: Verify checked-in OpenAPI spec
        run: |
          python scripts/export_openapi.py
          git diff --exit-code docs/openapi.json

      - name: Run public fixture sanity check
        run: |
          python scripts/scrutinize.py

  build:
    runs-on: ubuntu-latest
    needs: [test, contract]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
          python scripts/check_distribution_contents.py

      - name: Smoke-test built wheel
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          pip install dist/*.whl
          bnt status
          python scripts/smoke_installed_package.py

      - name: Smoke-test source distribution
        run: |
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          pip install dist/*.tar.gz
          bnt status
          python scripts/smoke_installed_package.py

      - name: Smoke-test packaged REST server
        run: |
          python -m venv .venv-rest
          . .venv-rest/bin/activate
          pip install dist/*.whl fastapi uvicorn[standard] pydantic python-multipart
          python scripts/smoke_installed_package.py --serve --port 8010

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/*
